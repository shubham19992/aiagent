<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstract emerald background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="55%" stop-color="#053e30"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <!-- soft glows -->
  <circle cx="280" cy="240" r="520" fill="url(#glow1)"/>
  <circle cx="1380" cy="820" r="560" fill="url(#glow2)"/>

  <!-- abstract infra "nodes + links" -->
  <g stroke="#34d399" stroke-opacity="0.30" stroke-width="1.6" fill="none">
    <path d="M180 700 L420 560 L640 660 L900 520 L1180 600 L1420 460"/>
    <path d="M300 860 L560 760 L760 820 L1020 700 L1260 760"/>
    <path d="M420 560 L560 760"/>
    <path d="M900 520 L1020 700"/>
    <path d="M640 660 L760 820"/>
    <path d="M1180 600 L1260 760"/>
  </g>
  <g fill="#6ee7b7">
    <circle cx="180" cy="700" r="6" fill-opacity="0.85"/>
    <circle cx="420" cy="560" r="7" fill-opacity="0.9"/>
    <circle cx="640" cy="660" r="6" fill-opacity="0.8"/>
    <circle cx="900" cy="520" r="8" fill-opacity="0.95"/>
    <circle cx="1180" cy="600" r="6" fill-opacity="0.8"/>
    <circle cx="1420" cy="460" r="7" fill-opacity="0.9"/>
    <circle cx="300" cy="860" r="5" fill-opacity="0.7"/>
    <circle cx="560" cy="760" r="6" fill-opacity="0.8"/>
    <circle cx="760" cy="820" r="5" fill-opacity="0.7"/>
    <circle cx="1020" cy="700" r="6" fill-opacity="0.8"/>
    <circle cx="1260" cy="760" r="6" fill-opacity="0.8"/>
  </g>

  <!-- faint large rings for depth -->
  <g fill="none" stroke="#10b981" stroke-opacity="0.10" stroke-width="2">
    <circle cx="1280" cy="220" r="180"/>
    <circle cx="1280" cy="220" r="280"/>
    <circle cx="240" cy="900" r="160"/>
  </g>
</svg>
